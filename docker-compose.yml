services:
  db:
    image: postgres:16-alpine
    container_name: minisocial_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: minisocial_rmq
    ports:
      - "5672:5672"  
      - "15672:15672" 
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5


  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minisocial_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy 
      rabbitmq:
        condition: service_healthy 

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minisocial_worker
    command: ["sh", "/app/scripts/start_worker.sh"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy 


volumes:
  postgres_data:
